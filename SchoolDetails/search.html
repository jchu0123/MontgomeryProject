<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>School Search Results - Montgomery</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Header / Navigation Area -->
<header class="sticky top-0 z-50 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex items-center justify-between h-16">
<div class="flex items-center gap-4">
<a href="index.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors inline-block">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">arrow_back</span>
</a>
<h1 class="text-xl font-bold tracking-tight">Montgomery Schools</h1>
</div>
<div class="hidden md:flex items-center space-x-4">
<button class="flex items-center gap-2 px-4 py-2 rounded-lg bg-primary text-white font-medium hover:bg-primary/90 transition-colors">
<span class="material-symbols-outlined text-sm">filter_list</span>
                        Filters
                    </button>
</div>
</div>
</div>
</header>
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
<!-- Search and Info Section -->
<div class="mb-8">
<nav class="flex items-center gap-2 mb-6">
<a class="flex items-center gap-1 text-sm font-medium text-primary hover:underline" href="index.html">
<span class="material-symbols-outlined text-sm">chevron_left</span>
                    Back to search
                </a>
</nav>
<div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
<div>
<h2 id="searchResultCount" class="text-3xl font-extrabold text-slate-900 dark:text-slate-50">Loading...</h2>
<p id="searchQueryText" class="mt-2 text-slate-500 dark:text-slate-400"></p>
</div>
<div class="w-full md:w-96">
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors">search</span>
</div>
<input id="searchInput" class="block w-full pl-10 pr-3 py-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary transition-all text-sm" placeholder="Search schools..." type="text" value=""/>
</div>
</div>
</div>
</div>
<!-- School Results Grid -->
<div id="schoolGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
</div>
<!-- No results message -->
<div id="noResults" class="hidden text-center py-20">
  <span class="material-symbols-outlined text-5xl text-slate-300">search_off</span>
  <p class="mt-4 text-lg text-slate-500">No schools found matching your search.</p>
</div>
<!-- Pagination -->
<div id="paginationContainer" class="mt-12 flex items-center justify-center gap-2 flex-wrap">
</div>
</main>
<!-- Bottom Navigation (Mobile Only) -->
<div class="fixed bottom-0 left-0 right-0 md:hidden bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-4 py-2 flex items-center justify-around z-50">
<a class="flex flex-col items-center gap-0.5 text-primary" href="#">
<span class="material-symbols-outlined">search</span>
<span class="text-[10px] font-medium">Search</span>
</a>
<a class="flex flex-col items-center gap-0.5 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">favorite</span>
<span class="text-[10px] font-medium">Saved</span>
</a>
<a class="flex flex-col items-center gap-0.5 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">map</span>
<span class="text-[10px] font-medium">Map</span>
</a>
<a class="flex flex-col items-center gap-0.5 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Profile</span>
</a>
</div>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const urlParams = new URLSearchParams(window.location.search);
        let currentQuery = urlParams.get('q') || '';
        let currentTag = urlParams.get('tag') || '';

        const searchInput = document.getElementById('searchInput');
        const resultCount = document.getElementById('searchResultCount');
        const queryText = document.getElementById('searchQueryText');
        const schoolGrid = document.getElementById('schoolGrid');
        const noResults = document.getElementById('noResults');
        const paginationContainer = document.getElementById('paginationContainer');

        let currentPage = 1;
        const itemsPerPage = 20;
        let allSchools = [];

        // Type badge styling
        const typeBadge = (type) => {
            const map = {
                'Public School':   'bg-primary/10 text-primary',
                'Private School':  'bg-amber-100 text-amber-700',
            };
            return map[type] || 'bg-slate-100 text-slate-600';
        };

        const schoolImg = 'https://lh3.googleusercontent.com/aida-public/AB6AXuDDDOq6lP7oMEjupblnskosFmXVYbhxEOL1rQQMQ7Koq3FZoUwlMTBYdbeSUmTbC8jHcNiG0ASiFdZNqwB00pPPHGHbTP-IU0PJBCUxPBghzXQ48XwX-jSY0fXHwYOT2ePTLNctzElN2WNuWy_klNr8WasXy5y5Jm2ct54JyUoZuXQXT493u524XRnQDUwIXc2AgTKU3VsL7hkN9aA8D65zXjEDd7JfRmk2_LqTHX3ToJxxW-evNFDTnRIDLFm2pYrcSoF4WGFX3ZpI';

        const buildCard = (school) => {
            const card = document.createElement('div');
            card.className = 'bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 overflow-hidden hover:shadow-lg transition-shadow duration-300 school-card';
            card.dataset.name = school.name.toLowerCase();
            card.dataset.type = school.type.toLowerCase();
            card.innerHTML = `
                <div class="h-40 bg-primary/5 dark:bg-primary/10 flex items-center justify-center p-6">
                    <img class="w-full h-full object-contain" src="${schoolImg}" alt="School illustration"/>
                </div>
                <div class="p-5">
                    <div class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium ${typeBadge(school.type)} mb-3">${school.type}</div>
                    <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-2 line-clamp-1">${school.name}</h3>
                    <div class="space-y-2 text-sm text-slate-600 dark:text-slate-400">
                        <div class="flex items-start gap-2">
                            <span class="material-symbols-outlined text-base mt-0.5 text-slate-400">location_on</span>
                            <span>${school.address}, ${school.city}, AL ${school.zip}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-base text-slate-400">call</span>
                            <span>${school.phone || 'N/A'}</span>
                        </div>
                    </div>
                    <button class="mt-6 w-full py-2 px-4 bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white font-semibold rounded-lg hover:bg-primary hover:text-white transition-all duration-200">
                        View Profile
                    </button>
                </div>
            `;
            return card;
        };

        const renderPagination = (totalPages) => {
            paginationContainer.innerHTML = '';
            if (totalPages <= 1) return;

            const prevBtn = document.createElement('button');
            prevBtn.className = `p-2 border border-slate-200 dark:border-slate-800 rounded-lg transition-colors ${currentPage === 1 ? 'opacity-50 cursor-not-allowed' : 'hover:bg-white dark:hover:bg-slate-800'}`;
            prevBtn.innerHTML = '<span class="material-symbols-outlined">chevron_left</span>';
            prevBtn.disabled = currentPage === 1;
            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) { currentPage--; renderPage(); window.scrollTo(0, 0); }
            });
            paginationContainer.appendChild(prevBtn);

            const maxPagesToShow = Math.min(totalPages, 15);
            for (let i = 1; i <= maxPagesToShow; i++) {
                const pageBtn = document.createElement('button');
                const isActive = i === currentPage;
                pageBtn.className = `w-10 h-10 rounded-lg transition-colors ${isActive ? 'bg-primary text-white font-medium' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800'}`;
                pageBtn.textContent = i;
                pageBtn.addEventListener('click', () => { currentPage = i; renderPage(); window.scrollTo(0, 0); });
                paginationContainer.appendChild(pageBtn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = `p-2 border border-slate-200 dark:border-slate-800 rounded-lg transition-colors ${currentPage === totalPages ? 'opacity-50 cursor-not-allowed' : 'hover:bg-white dark:hover:bg-slate-800'}`;
            nextBtn.innerHTML = '<span class="material-symbols-outlined">chevron_right</span>';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.addEventListener('click', () => {
                if (currentPage < totalPages) { currentPage++; renderPage(); window.scrollTo(0, 0); }
            });
            paginationContainer.appendChild(nextBtn);
        };

        const getFilteredSchools = () => {
            const q = searchInput.value.toLowerCase();
            const tag = currentTag.toLowerCase();
            return allSchools.filter(school => {
                const matchesQuery = !q || school.name.toLowerCase().includes(q) || school.address.toLowerCase().includes(q) || school.city.toLowerCase().includes(q);
                const matchesTag = !tag || school.type.toLowerCase().includes(tag) || school.level.toLowerCase().includes(tag);
                return matchesQuery && matchesTag;
            });
        };

        const renderPage = () => {
            const filtered = getFilteredSchools();
            const totalMatches = filtered.length;
            const totalPages = Math.ceil(totalMatches / itemsPerPage);

            if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
            else if (totalPages === 0) currentPage = 1;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const pageItems = filtered.slice(startIndex, startIndex + itemsPerPage);

            resultCount.textContent = `${totalMatches} school${totalMatches !== 1 ? 's' : ''} found`;

            const q = searchInput.value.trim();
            if (q && currentTag) {
                queryText.textContent = `Showing results for "${q}" tagged "${currentTag}"`;
            } else if (q) {
                queryText.textContent = `Showing results for "${q}"`;
            } else if (currentTag) {
                queryText.textContent = `Showing all "${currentTag}" schools`;
            } else {
                queryText.textContent = 'Showing all schools in the Montgomery region';
            }

            schoolGrid.innerHTML = '';
            if (pageItems.length === 0) {
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                pageItems.forEach(school => schoolGrid.appendChild(buildCard(school)));
            }

            renderPagination(totalPages);
        };

        // Load data
        try {
            const res = await fetch('schools.json');
            allSchools = await res.json();
        } catch(e) {
            resultCount.textContent = 'Failed to load school data.';
            return;
        }

        // Pre-fill search from URL
        if (currentQuery) searchInput.value = currentQuery;

        renderPage();

        // Live filtering
        searchInput.addEventListener('input', (e) => {
            const newUrl = new URL(window.location);
            if (e.target.value) {
                newUrl.searchParams.set('q', e.target.value);
            } else {
                newUrl.searchParams.delete('q');
            }
            window.history.replaceState({}, '', newUrl);
            currentPage = 1;
            renderPage();
        });
    });
</script>
</body></html>
